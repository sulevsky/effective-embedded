[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = stm32cube
monitor_speed = 115200

; upload_protocol = stlink
; usb 
; upload_protocol = dfu
; debug_tool = stlink
; monitor_port = /dev/cu.debug-console
; monitor_port = /dev/uart.debug-console
[env:native]
platform = native
